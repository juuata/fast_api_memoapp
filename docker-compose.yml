services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: memoapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build: ./frontapp
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontapp:/app
      - /app/node_modules

volumes:
  postgres_data:
